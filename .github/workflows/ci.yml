name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.16.0
  BUN_VERSION: 1.3.14

jobs:
  contracts:
    name: Management contracts (Bun 1.3.14)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Verify pinned runtime and frozen dependency graph
        run: |
          test "$(bun --version)" = "$BUN_VERSION"
          bun install --frozen-lockfile
      - name: Validate canonical OpenAPI and generated artifacts
        run: |
          bun run contracts:validate
          bun run contracts:check
          bun run typecheck
          bun run test
      - name: Scan source and production log sinks for secrets
        run: python3 scripts/check-secret-exposure.py

  dashboard:
    name: Dashboard (pinned Bun production runtime)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install the frozen workspace
        run: |
          test "$(bun --version)" = "$BUN_VERSION"
          bun install --frozen-lockfile
      - name: Lint, typecheck, and unit test
        run: |
          bun run dashboard:lint
          bun run dashboard:typecheck
          bun run dashboard:test
      - name: Build and start with the pinned production runtime
        env:
          NTIP_DASHBOARD_BUILD_ID: ${{ github.sha }}
        run: |
          bun run dashboard:build
          bun run dashboard:runtime-smoke
      - name: Install the pinned Playwright Chromium build
        working-directory: apps/dashboard
        run: ./node_modules/.bin/playwright install --with-deps chromium
      - name: Exercise the same-origin HTTPS dashboard
        run: bun run dashboard:e2e
      - name: Package both dashboard architectures and execute x86_64 Bun
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip
          export SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)
          version=$(./scripts/check-version.sh)
          ./scripts/package-dashboard-release.sh "$version" x86_64-linux
          ./scripts/package-dashboard-release.sh "$version" aarch64-linux
          python3 scripts/check-dashboard-release-archive.py \
            "$version" x86_64-linux \
            "dist/ntip-dashboard-v$version-x86_64-linux.tar.gz" \
            --require-native-execution
          python3 scripts/check-dashboard-release-archive.py \
            "$version" aarch64-linux \
            "dist/ntip-dashboard-v$version-aarch64-linux.tar.gz"
          ./scripts/check-installer-isolation.sh dist/ntip-dashboard-*.tar.gz
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: dashboard-playwright-evidence
          path: output/playwright/
          if-no-files-found: ignore
          retention-days: 7

  portable:
    name: Portable (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Verify toolchain
        run: test "$(zig version)" = "$ZIG_VERSION"
      - name: Formatting
        run: zig fmt --check build.zig build.zig.zon src
      - name: Validate release-gate schemas and negative cases
        run: |
          python3 -m unittest tests/scripts/test_release_gate_validator.py
          python3 scripts/check-packaging-contract.py
          python3 scripts/check-vendored-sqlite.py
          python3 scripts/check-secret-exposure.py
          found=0
          for gate in release/gates/*.json; do
            test -f "$gate" || continue
            found=1
            version=${gate##*/}
            version=${version%.json}
            python3 scripts/check-release-gate.py "$gate" "$version"
          done
          test "$found" -eq 1
      - name: Compile checks
        run: zig build check
      - name: Unit tests
        run: zig build test
      - name: Version consistency
        run: zig build version-check
      - name: Fuzz smoke
        run: zig build fuzz

  cross-build:
    name: Static musl cross-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Install release validation tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils file jq python3-venv
      - run: zig build cross
      - name: Two clean reproducible release builds and archives
        run: |
          export SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)
          version=$(./scripts/check-version.sh)
          mkdir -p artifacts
          ./scripts/check-clean-release-reproducibility.sh "$version" \
            | tee artifacts/clean-release-reproducibility.txt
          ./scripts/check-installer-isolation.sh dist/*.tar.gz \
            | tee artifacts/installer-isolation.txt
          python3 scripts/check-secret-exposure.py --archives dist/*.tar.gz \
            | tee artifacts/secret-exposure.txt
      - name: Validate SPDX with the official SPDX Python tools
        run: |
          python3 -m venv "$RUNNER_TEMP/spdx-tools"
          "$RUNNER_TEMP/spdx-tools/bin/pip" install \
            --disable-pip-version-check spdx-tools==0.8.5
          PATH="$RUNNER_TEMP/spdx-tools/bin:$PATH" \
            ./scripts/validate-spdx.sh dist/*.spdx.json \
            | tee artifacts/spdx-validation.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ntip-cross-builds
          path: |
            zig-out/release/
            dist/
            artifacts/
          if-no-files-found: error
          retention-days: 7

  noise-oracles:
    name: Independent Noise transcript oracles
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install isolated oracle runtimes
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go jq python3-venv
      - name: Compare pinned Python and Go implementations
        run: ./scripts/check-noise-oracles.sh

  namespace-x86_64:
    name: Privileged namespaces (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkout the pinned v0.1 Node source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: 612fec453bb112b36e547c0f7ce6317f8e23e85b
          path: .compat/ntip-v0.1
          persist-credentials: false
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install namespace tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils conntrack curl iperf3 iproute2 jq nftables unzip
      - name: Build the exact v0.1 Node compatibility client
        working-directory: .compat/ntip-v0.1
        run: |
          test "$(git rev-parse HEAD)" = 612fec453bb112b36e547c0f7ce6317f8e23e85b
          zig build
          install -D -m 0755 zig-out/bin/ntcl "$RUNNER_TEMP/ntip-v0.1/ntcl"
          test "$("$RUNNER_TEMP/ntip-v0.1/ntcl" version)" = "ntcl 0.1.0-dev"
      - name: Build native binaries and integration tests
        run: |
          zig build
          zig build integration
      - name: Execute the packaged static x86_64 binaries
        run: |
          zig build release
          export SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)
          version=$(./scripts/check-version.sh)
          ./scripts/package-release.sh "$version" x86_64-linux-musl
          mkdir -p artifacts
          python3 scripts/check-release-archive.py \
            "$version" x86_64-linux-musl \
            "dist/ntip-v$version-x86_64-linux-musl.tar.gz" \
            --require-native-execution \
            | tee artifacts/native-package-x86_64.txt
          python3 scripts/check-release-archive.py \
            "$version" x86_64-linux-musl \
            "dist/ntip-api-v$version-x86_64-linux-musl.tar.gz" \
            --require-native-execution \
            | tee artifacts/native-api-package-x86_64.txt
          bun install --frozen-lockfile
          bun run dashboard:build
          ./scripts/package-dashboard-release.sh "$version" x86_64-linux
          python3 scripts/check-dashboard-release-archive.py \
            "$version" x86_64-linux \
            "dist/ntip-dashboard-v$version-x86_64-linux.tar.gz" \
            --require-native-execution \
            | tee artifacts/native-dashboard-package-x86_64.txt
      - name: Install disposable-runner service prerequisites
        run: |
          sudo ./scripts/install.sh
          sudo ./scripts/install-api.sh
          dashboard_extract="$RUNNER_TEMP/ntip-dashboard-package"
          mkdir -p "$dashboard_extract"
          tar -xzf dist/ntip-dashboard-v*-x86_64-linux.tar.gz -C "$dashboard_extract"
          sudo "$dashboard_extract"/ntip-dashboard-v*-x86_64-linux/scripts/install-dashboard.sh
      - name: Verify systemd unit syntax and confinement
        run: |
          sudo systemd-analyze verify ntsrv.service ntcl.service ntip-api.service ntip-dashboard.service
          sudo ./scripts/check-systemd-security.sh ntsrv.service ntcl.service ntip-api.service ntip-dashboard.service \
            | tee artifacts/systemd-security-x86_64.txt
      - name: Exercise the installed Master through systemd
        run: |
          sudo env NTIP_SYSTEMD_SMOKE_DISPOSABLE=1 \
            ./scripts/integration/systemd-master-smoke.sh \
            | tee artifacts/systemd-runtime-x86_64.txt
          sudo systemctl start ntip-dashboard.service
          dashboard_ready=0
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/login >/dev/null 2>&1; then
              dashboard_ready=1
              break
            fi
            sleep 0.25
          done
          if [ "$dashboard_ready" -ne 1 ]; then
            sudo journalctl --no-pager -u ntip-dashboard.service
            sudo systemctl stop ntip-dashboard.service || true
            exit 1
          fi
          sudo systemctl stop ntip-dashboard.service
      - name: Run namespace, NAT, roaming, and kernel-policy scenarios
        run: sudo env NTIP_BIN_DIR="$PWD/zig-out/bin" NTIP_KEEP_FAILED=1 ./scripts/integration/ns-integration.sh
      - name: Prove pinned v0.1 Node enrollment and reconnect
        run: |
          compat_evidence=artifacts/v0.1-node-compatibility-x86_64.txt
          printf 'clientCommit=%s\nclientVersion=%s\n' \
            612fec453bb112b36e547c0f7ce6317f8e23e85b \
            "$("$RUNNER_TEMP/ntip-v0.1/ntcl" version)" \
            > "$compat_evidence"
          sudo env \
            NTIP_BIN_DIR="$PWD/zig-out/bin" \
            NTIP_CLIENT_BIN="$RUNNER_TEMP/ntip-v0.1/ntcl" \
            NTIP_COMPATIBILITY_ONLY=1 \
            NTIP_KEEP_FAILED=1 \
            NTIP_TEST_ID="v01${GITHUB_RUN_ID}${GITHUB_RUN_ATTEMPT}" \
            ./scripts/integration/ns-integration.sh \
            | tee -a "$compat_evidence"
      - name: Upload integration logs after failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: namespace-x86_64-logs
          path: /tmp/ntip-integration-*/logs/
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload x86_64 package and systemd evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: namespace-x86_64-evidence
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7

  native-aarch64:
    name: Native Linux AArch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install namespace tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils conntrack curl iperf3 iproute2 jq nftables unzip
      - name: Native build and tests
        run: |
          test "$(uname -m)" = aarch64
          zig build check
          zig build test
          zig build integration
          zig build
      - name: Execute the packaged static AArch64 binaries
        run: |
          zig build release
          export SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)
          version=$(./scripts/check-version.sh)
          ./scripts/package-release.sh "$version" aarch64-linux-musl
          mkdir -p artifacts
          python3 scripts/check-release-archive.py \
            "$version" aarch64-linux-musl \
            "dist/ntip-v$version-aarch64-linux-musl.tar.gz" \
            --require-native-execution \
            | tee artifacts/native-package-aarch64.txt
          python3 scripts/check-release-archive.py \
            "$version" aarch64-linux-musl \
            "dist/ntip-api-v$version-aarch64-linux-musl.tar.gz" \
            --require-native-execution \
            | tee artifacts/native-api-package-aarch64.txt
          bun install --frozen-lockfile
          bun run dashboard:build
          ./scripts/package-dashboard-release.sh "$version" aarch64-linux
          python3 scripts/check-dashboard-release-archive.py \
            "$version" aarch64-linux \
            "dist/ntip-dashboard-v$version-aarch64-linux.tar.gz" \
            --require-native-execution \
            | tee artifacts/native-dashboard-package-aarch64.txt
      - name: Install and run native integration
        run: |
          sudo ./scripts/install.sh
          sudo ./scripts/install-api.sh
          dashboard_extract="$RUNNER_TEMP/ntip-dashboard-package"
          mkdir -p "$dashboard_extract"
          tar -xzf dist/ntip-dashboard-v*-aarch64-linux.tar.gz -C "$dashboard_extract"
          sudo "$dashboard_extract"/ntip-dashboard-v*-aarch64-linux/scripts/install-dashboard.sh
          sudo systemd-analyze verify ntsrv.service ntcl.service ntip-api.service ntip-dashboard.service
          sudo ./scripts/check-systemd-security.sh ntsrv.service ntcl.service ntip-api.service ntip-dashboard.service \
            | tee artifacts/systemd-security-aarch64.txt
          sudo env NTIP_SYSTEMD_SMOKE_DISPOSABLE=1 \
            ./scripts/integration/systemd-master-smoke.sh \
            | tee artifacts/systemd-runtime-aarch64.txt
          sudo env NTIP_BIN_DIR="$PWD/zig-out/bin" NTIP_KEEP_FAILED=1 ./scripts/integration/ns-integration.sh
          sudo systemctl start ntip-dashboard.service
          dashboard_ready=0
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/login >/dev/null 2>&1; then
              dashboard_ready=1
              break
            fi
            sleep 0.25
          done
          if [ "$dashboard_ready" -ne 1 ]; then
            sudo journalctl --no-pager -u ntip-dashboard.service
            sudo systemctl stop ntip-dashboard.service || true
            exit 1
          fi
          sudo systemctl stop ntip-dashboard.service
      - name: Upload AArch64 package and systemd evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-aarch64-evidence
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7
