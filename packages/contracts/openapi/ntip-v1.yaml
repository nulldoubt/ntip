              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /sessions/{id}:
    parameters:
      - $ref: '#/components/parameters/SessionId'
    delete:
      operationId: revokeSession
      summary: Revoke an own session, or any session for a superuser
      tags: [Sessions]
      x-ntip-roles: [viewer, operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
  /settings:
    get:
      operationId: getSettings
      summary: Read desired and effective operational settings
      tags: [Settings]
      x-ntip-roles: [viewer, operator, superuser]
      responses:
        '200':
          description: Current desired and effective settings state.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsState'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    patch:
      operationId: updateSettings
      summary: Create an immutable full settings revision from a partial update
      tags: [Settings]
      x-ntip-roles: [superuser]
      x-ntip-dangerous: true
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdate'
      responses:
        '202':
          description: Revision committed and queued for live application or restart.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsRevision'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /settings/revisions:
    get:
      operationId: listSettingsRevisions
      summary: List immutable settings revisions
      tags: [Settings]
      x-ntip-roles: [viewer, operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: Page of settings revisions.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsRevisionPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /settings/revisions/{id}/rollback:
    parameters:
      - $ref: '#/components/parameters/SettingsRevisionId'
    post:
      operationId: rollbackSettings
      summary: Create a new revision from an earlier settings snapshot
      tags: [Settings]
      x-ntip-roles: [superuser]
      x-ntip-dangerous: true
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DangerousConfirmation'
      responses:
        '202':
          description: Rollback revision committed and queued for application.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsRevision'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
  /operations/restart:
    post:
      operationId: restartService
      summary: Commit an audit record and request managed restart
      description: Supply the current `serviceControlEtag` from `/overview` as If-Match.
      tags: [Service control]
      x-ntip-roles: [superuser]
      x-ntip-dangerous: true
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestartRequest'
      responses:
        '202':
          description: Restart audit committed; ntsrv will exit with its managed-restart status.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedOperation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /operations/shutdown:
    post:
      operationId: shutdownService
      summary: Commit an audit record and request clean shutdown
      description: Supply the current `serviceControlEtag` from `/overview` as If-Match.
      tags: [Service control]
      x-ntip-roles: [superuser]
      x-ntip-dangerous: true
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShutdownRequest'
      responses:
        '202':
          description: Shutdown audit committed; ntsrv will exit cleanly.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedOperation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-ntip_session
      description: Opaque 256-bit session token. Only its hash is persisted.
  headers:
    XRequestId:
      description: Lowercase request identifier used in logs and error responses.
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    NoStore:
      description: Management responses are never cached.
      required: true
      schema:
        type: string
        const: no-store
    ETag:
      description: Strong generation tag required by later mutations.
      required: true
      schema:
        $ref: '#/components/schemas/EntityTag'
    Location:
      description: Relative URL of the created resource.
      required: true
      schema:
        type: string
    Attachment:
      description: Safe attachment filename generated by the service.
      required: true
      schema:
        type: string
        pattern: '^attachment; filename="[A-Za-z0-9._-]+"$'
    SessionCookie:
      description: '`__Host-ntip_session` with Secure, HttpOnly, SameSite=Strict, and Path=/.'
      required: true
      schema:
        type: string
        pattern: '^__Host-ntip_session=.*; Path=/; Secure; HttpOnly; SameSite=Strict$'
    RetryAfter:
      description: Seconds until another attempt is recommended.
      required: true
      schema:
        type: integer
        minimum: 1
  parameters:
    Cursor:
      name: cursor
      in: query
      description: Opaque forward-only pagination cursor.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    PageLimit:
      name: limit
      in: query
      description: Page size; defaults to 50 and is capped at 200.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Origin:
      name: Origin
      in: header
      required: true
      description: Must exactly match the configured public HTTPS origin.
      schema:
        type: string
        format: uri
        maxLength: 2048
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: Session-bound token obtained from `/auth/me`.
      schema:
        type: string
        minLength: 43
        maxLength: 128
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Caller-generated key scoped to the authenticated principal and operation.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: '^[A-Za-z0-9._:-]+$'
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: Strong ETag returned by the latest read of the target generation.
      schema:
        type: string
        pattern: '^"[a-z0-9._:-]{1,96}"$'
    VnrName:
      name: name
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Name'
    NodeId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    RouteId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    ConnectivityCheckId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    UserId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    SessionId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
    SettingsRevisionId:
      name: id
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
  responses:
    NoContent:
      description: Operation completed without a response body.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
    BadRequest:
      description: |
        Malformed framing, JSON, parameters, or validation input. Inventory
        address/CIDR parsing and prefix-range failures use HTTP 400 with the
        top-level `validation_failed` error code.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: No valid session or invalid credentials.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: The authenticated principal or request origin is not authorized.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource does not exist or is not visible.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: |
        The operation conflicts with a domain invariant or idempotency record.
        Inventory reserved-address, outside-VNR, overlap, and dependent-resource
        failures use HTTP 409 with `invariant_violation`; an address already
        assigned to another Node uses HTTP 409 with `conflict`.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PreconditionFailed:
      description: The supplied ETag is stale.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
        ETag:
          $ref: '#/components/headers/ETag'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PreconditionRequired:
      description: A required If-Match precondition was omitted.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Principal or global authentication work is throttled.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: An unexpected failure was assigned a request ID.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: ntsrv, its operator worker, or a bounded required queue is unavailable.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Id:
      type: string
      description: Lowercase 128-bit identifier without separators.
      pattern: '^[0-9a-f]{32}$'
      examples: [018f8d95b0f74d669f16a606fa9c87e2]
    EntityTag:
      type: string
      description: Opaque strong entity tag, including its required double quotes.
      pattern: '^"[a-z0-9._:-]{1,96}"$'
    Name:
      type: string
      minLength: 1
      maxLength: 63
      pattern: '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,62}$'
      examples: [edge-berlin-01]
    Username:
      type: string
      description: Canonical lowercase ASCII username.
      minLength: 1
      maxLength: 63
      pattern: '^[a-z0-9_][a-z0-9_.-]{0,62}$'
      examples: [operator]
    Password:
      type: string
      format: password
      minLength: 14
      maxLength: 256
      writeOnly: true
    TemporaryPassword:
      allOf:
        - $ref: '#/components/schemas/Password'
      readOnly: true
      description: Returned exactly once and never persisted in recoverable form.
    Timestamp:
      type: string
      format: date-time
      minLength: 20
      maxLength: 20
      pattern: '^[0-9]{4}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12][0-9]|3[01])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]Z$'
      description: Whole-second RFC 3339 timestamp in canonical UTC form (`YYYY-MM-DDTHH:mm:ssZ`); calendar validity is enforced by the service.
      examples: ['2026-07-20T12:34:56Z']
    NullableTimestamp:
      oneOf:
        - $ref: '#/components/schemas/Timestamp'
        - type: 'null'
    Ipv4Address:
      type: string
      format: ipv4
      examples: [10.42.0.2]
    Ipv4Cidr:
      type: string
      pattern: '^(?:[0-9]{1,3}\.){3}[0-9]{1,3}/(?:[0-9]|[12][0-9]|3[0-2])$'
      examples: [10.42.0.0/24]
    Generation:
      type: integer
      format: int64
      minimum: 0
    Role:
      type: string
      enum: [viewer, operator, superuser]
    UserStatus:
      type: string
      enum: [active, disabled, tombstoned]
    EnrollmentState:
      type: string
      enum: [unenrolled, credential_issued, enrolled]
    LivenessState:
      type: string
      enum: [unknown, online, suspect, offline]
    RuntimeSessionState:
      type: string
      enum: [disconnected, enrolling, connecting, established]
    TrafficState:
      type: string
      enum: [unknown, cold, warm, hot, saturated]
    EventSeverity:
      type: string
      enum: [info, warning, critical]
    SettingsRevisionStatus:
      type: string
      enum: [pending_apply, active, failed, pending_restart]
    ConnectivityCheckStatus:
      type: string
      enum: [queued, running, succeeded, timed_out, failed, interrupted]
    ErrorCode:
      type: string
      description: Stable machine-readable error code; messages are not stable contracts.
      enum:
        - invalid_request
        - validation_failed
        - authentication_required
        - invalid_credentials
        - password_change_required
        - csrf_failed
        - origin_forbidden
        - forbidden
        - reauthentication_required
        - not_found
        - conflict
        - invariant_violation
        - idempotency_required
        - idempotency_conflict
        - precondition_required
        - precondition_failed
        - rate_limited
        - service_unavailable
        - operation_unavailable
        - internal_error
    FieldViolation:
      type: object
      description: |
        Structured detail for an invalid inventory field. The top-level error
        code and HTTP status remain authoritative; clients use these details to
        associate an actionable error with a form field. Known inventory
        fields are `address`, `cidr`, and `prefix`.
      additionalProperties: false
      required: [field, code, message]
      properties:
        field:
          type: string
          description: Canonical request field name; known inventory fields are `address`, `cidr`, and `prefix`.
          maxLength: 256
        code:
          type: string
          description: |
            Stable inventory violation code. v0.2 defines
            `invalid_ipv4_address`, `address_outside_vnr`,
            `address_reserved_network`, `address_reserved_master`,
            `address_reserved_broadcast`, `address_in_use`,
            `invalid_ipv4_cidr`, `noncanonical_ipv4_cidr`,
            `prefix_out_of_range`, `range_reserved`,
            `range_overlaps_vnr`, `range_overlaps_route`,
            `range_excludes_node`, and `range_reserves_node_address`.
            Future revisions may add codes, so clients must preserve and
            gracefully display unknown values.
          pattern: '^[a-z][a-z0-9_]{0,63}$'
        message:
          type: string
          description: Human-readable explanation; wording is not a stable contract.
          maxLength: 512
    ErrorObject:
      type: object
      additionalProperties: false
      required: [code, message, requestId]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          maxLength: 512
        requestId:
          description: Same identifier as the `X-Request-ID` response header.
          $ref: '#/components/schemas/Id'
        violations:
          type: array
          description: Optional field details for validation, invariant, and conflict failures.
          maxItems: 64
          items:
            $ref: '#/components/schemas/FieldViolation'
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'
    PageCursor:
      type: object
      additionalProperties: false
      required: [nextCursor]
      properties:
        nextCursor:
          type: [string, 'null']
          maxLength: 512
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          const: live
    ReadinessStatus:
      type: object
      additionalProperties: false
      required: [status, ntsrv, databaseSchemaVersion]
      properties:
        status:
          type: string
          const: ready
        ntsrv:
          type: string
          const: ready
        databaseSchemaVersion:
          type: integer
          minimum: 1
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          $ref: '#/components/schemas/Username'
        password:
          $ref: '#/components/schemas/Password'
    ReauthenticateRequest:
      type: object
      additionalProperties: false
      required: [password]
      properties:
        password:
          $ref: '#/components/schemas/Password'
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          $ref: '#/components/schemas/Password'
        newPassword:
          $ref: '#/components/schemas/Password'
    AuthContext:
      type: object
      additionalProperties: false
      required: [user, session, csrfToken]
      properties:
        user:
          $ref: '#/components/schemas/User'
        session:
          $ref: '#/components/schemas/Session'
        csrfToken:
          type: string
          minLength: 43
          maxLength: 128
          readOnly: true
    ReauthenticationStatus:
      type: object
      additionalProperties: false
      required: [validUntil]
      properties:
        validUntil:
          $ref: '#/components/schemas/Timestamp'
    InventoryCounts:
      type: object
      additionalProperties: false
      required: [vnrs, nodes, routes]
      properties:
        vnrs:
          type: integer
          minimum: 0
        nodes:
          type: integer
          minimum: 0
        routes:
          type: integer
          minimum: 0
    RuntimeCounts:
      type: object
      additionalProperties: false
      required: [online, suspect, offline, unknown]
      properties:
        online:
          type: integer
          minimum: 0
        suspect:
          type: integer
          minimum: 0
        offline:
          type: integer
          minimum: 0
        unknown:
          type: integer
          minimum: 0
    Overview:
      type: object
      additionalProperties: false
      required:
        - generation
        - inventory
        - runtime
        - desiredSettingsRevisionId
        - effectiveSettingsRevisionId
        - serviceControlEtag
        - observedAt
      properties:
        generation:
          $ref: '#/components/schemas/Generation'
        inventory:
          $ref: '#/components/schemas/InventoryCounts'
        runtime:
          $ref: '#/components/schemas/RuntimeCounts'
        desiredSettingsRevisionId:
          $ref: '#/components/schemas/Id'
        effectiveSettingsRevisionId:
          $ref: '#/components/schemas/Id'
        pendingRestart:
          type: boolean
          default: false
