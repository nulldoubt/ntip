      type: object
      additionalProperties: false
      required: [installerOrigin, spkiPin]
      properties:
        installerOrigin:
          type: string
          format: uri
          minLength: 9
          maxLength: 2048
          pattern: '^https://[^/?#]+(?::[0-9]{1,5})?$'
          description: Exact HTTPS origin serving the public bootstrap interface.
          examples: ['https://43.157.23.67']
        spkiPin:
          type: string
          minLength: 52
          maxLength: 52
          pattern: '^sha256//[A-Za-z0-9+/]{43}=$'
          description: curl-compatible SHA-256 pin for the configured TLS leaf public key.
          examples: ['sha256//AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=']
