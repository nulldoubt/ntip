    BootstrapId:
      type: string
      minLength: 8
      maxLength: 8
      pattern: '^[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{8}$'
      description: Public, permanently unique bootstrap locator; it is not an authenticator.
      examples: [ABCDEFGH]
    BootstrapSecretCode:
      type: string
      readOnly: true
      minLength: 11
      maxLength: 11
      pattern: '^[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{3}-[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{3}-[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{3}$'
      description: One-time-displayed 45-bit bootstrap code. It is never persisted or logged.
      examples: [ABC-DEF-GHJ]
