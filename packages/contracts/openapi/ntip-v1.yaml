      type: object
      additionalProperties: false
      readOnly: true
      required: [bootstrapId, secretCode, expiresAt]
      properties:
        bootstrapId:
          $ref: '#/components/schemas/BootstrapId'
        secretCode:
          $ref: '#/components/schemas/BootstrapSecretCode'
        expiresAt:
          $ref: '#/components/schemas/Timestamp'
      description: One-time management disclosure that must not be cached, logged, or replayed.
