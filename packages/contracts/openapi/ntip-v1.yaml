openapi: 3.1.1
info:
  title: NTIP Management API
  version: 1.1.0
  summary: Same-origin management contract for NTIP v0.2.
  description: |
    The versioned operator API exposed by the loopback-only `ntip-api` service.
    It is intended for the bundled dashboard and does not constitute a general
    automation compatibility promise in v0.2.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: /api/v1
    description: Same-origin API mounted by the operator TLS proxy
security:
  - sessionCookie: []
tags:
  - name: Health
  - name: Authentication
  - name: Read models
  - name: VNRs
  - name: Nodes
  - name: Routes
  - name: Enrollment
  - name: Diagnostics
  - name: Events
  - name: Audit
  - name: Users
  - name: Sessions
  - name: Settings
  - name: Service control
paths:
  /health/live:
    get:
      operationId: getLiveness
      summary: Report whether the HTTP process is alive
      tags: [Health]
      security: []
      responses:
        '200':
          description: The HTTP process is live.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '500':
          $ref: '#/components/responses/InternalError'
  /health/ready:
    get:
      operationId: getReadiness
      summary: Report whether ntsrv is reachable and ready
      tags: [Health]
      security: []
      responses:
        '200':
          description: The management service is ready.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatus'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /openapi.json:
    get:
      operationId: getOpenApiDocument
      summary: Return this canonical OpenAPI document as JSON
      tags: [Health]
      security: []
      responses:
        '200':
          description: Canonical API document.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /auth/login:
    post:
      operationId: login
      summary: Create a password-authenticated web session
      tags: [Authentication]
      security: []
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated. The opaque token is returned only as a cookie.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            Set-Cookie:
              $ref: '#/components/headers/SessionCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthContext'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /auth/me:
    get:
      operationId: getAuthContext
      summary: Resolve the current session and its CSRF token
      tags: [Authentication]
      responses:
        '200':
          description: Current authenticated context.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthContext'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /auth/reauth:
    post:
      operationId: reauthenticate
      summary: Refresh the session's dangerous-operation authorization window
      tags: [Authentication]
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReauthenticateRequest'
      responses:
        '200':
          description: Password verified and reauthentication window refreshed.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReauthenticationStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/change-password:
    post:
      operationId: changeOwnPassword
      summary: Change the current user's password and revoke other sessions
      tags: [Authentication]
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /auth/logout:
    post:
      operationId: logout
      summary: Revoke the current session
      tags: [Authentication]
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Session revoked or already absent.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            Set-Cookie:
              description: Expired `__Host-ntip_session` cookie.
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /overview:
    get:
      operationId: getOverview
      summary: Read the management overview
      tags: [Read models]
      x-ntip-roles: [viewer, operator, superuser]
      responses:
        '200':
          description: Inventory, runtime, and settings summary.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Overview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /topology:
    get:
      operationId: getTopology
      summary: Read the deterministic topology projection
      tags: [Read models]
      x-ntip-roles: [viewer, operator, superuser]
      responses:
        '200':
          description: Current topology projection.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topology'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /runtime/nodes:
    get:
      operationId: listNodeRuntime
      summary: List current in-memory Node observations
      tags: [Read models]
      x-ntip-roles: [viewer, operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageLimit'
        - name: liveness
          in: query
          schema:
            $ref: '#/components/schemas/LivenessState'
      responses:
        '200':
          description: Page of runtime observations.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeRuntimePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /vnrs:
    get:
      operationId: listVnrs
      summary: List virtual network ranges
      tags: [VNRs]
      x-ntip-roles: [viewer, operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          description: Page of VNRs.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VnrPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      operationId: createVnr
      summary: Create a virtual network range
      tags: [VNRs]
      x-ntip-roles: [operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VnrCreate'
      responses:
        '201':
          description: VNR created.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vnr'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /vnrs/{name}:
    parameters:
      - $ref: '#/components/parameters/VnrName'
    get:
      operationId: getVnr
      summary: Read one virtual network range
      tags: [VNRs]
      x-ntip-roles: [viewer, operator, superuser]
      responses:
        '200':
          description: VNR details.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vnr'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateVnr
      summary: Change a VNR CIDR while preserving its immutable name
      tags: [VNRs]
      x-ntip-roles: [operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VnrUpdate'
      responses:
        '200':
          description: Updated VNR.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vnr'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
    delete:
      operationId: deleteVnr
      summary: Delete an unused virtual network range
      tags: [VNRs]
      x-ntip-roles: [superuser]
      x-ntip-dangerous: true
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DangerousConfirmation'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
  /nodes:
    get:
      operationId: listNodes
      summary: List configured Nodes
      tags: [Nodes]
      x-ntip-roles: [viewer, operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageLimit'
        - name: vnrName
          in: query
          schema:
            $ref: '#/components/schemas/Name'
        - name: enrollmentState
          in: query
          schema:
            $ref: '#/components/schemas/EnrollmentState'
      responses:
        '200':
          description: Page of Nodes.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      operationId: createNode
      summary: Create an unenrolled Node
      tags: [Nodes]
      x-ntip-roles: [operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeCreate'
      responses:
        '201':
          description: Node created without disclosing an enrollment credential.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /nodes/actions/bootstrap:
    post:
      operationId: createNodeBootstrap
      summary: Create a Node and one-time bootstrap invitation atomically
      description: |
        Creates the inventory record, enrollment verifier, invitation, audit
        entry, and durable generation in one transaction. The short code is
        disclosed exactly once. Idempotent retries never replay the response;
        after a lost response the caller must locate the committed Node by its
        unique name and explicitly replace the invitation.
      tags: [Nodes, Enrollment]
      x-ntip-roles: [superuser]
      x-ntip-dangerous: true
      x-ntip-reauthentication: required
      x-ntip-etag-precondition: false
      x-ntip-one-time-response: true
      x-ntip-idempotency-replay: forbidden
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeBootstrapCreate'
      responses:
        '201':
          description: Node created and bootstrap invitation disclosed once.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeBootstrapDisclosure'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /nodes/{id}:
    parameters:
      - $ref: '#/components/parameters/NodeId'
    get:
      operationId: getNode
      summary: Read one Node
      tags: [Nodes]
      x-ntip-roles: [viewer, operator, superuser]
      responses:
        '200':
          description: Node details.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateNode
      summary: Rename, readdress, or move a Node to another VNR
      tags: [Nodes]
      x-ntip-roles: [operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeUpdate'
      responses:
        '200':
          description: Updated Node.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
    delete:
      operationId: deleteNode
      summary: Delete a Node that owns no routes
      tags: [Nodes]
      x-ntip-roles: [superuser]
      x-ntip-dangerous: true
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DangerousConfirmation'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '428':
          $ref: '#/components/responses/PreconditionRequired'
  /routes:
    get:
      operationId: listRoutes
      summary: List routed prefixes
      tags: [Routes]
      x-ntip-roles: [viewer, operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageLimit'
        - name: nodeId
          in: query
          schema:
            $ref: '#/components/schemas/Id'
      responses:
        '200':
          description: Page of routes.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      operationId: createRoute
      summary: Add a routed prefix owned by a Node
      tags: [Routes]
      x-ntip-roles: [operator, superuser]
      parameters:
        - $ref: '#/components/parameters/Origin'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteCreate'
      responses:
        '201':
          description: Route created.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /routes/{id}:
    parameters:
      - $ref: '#/components/parameters/RouteId'
    get:
      operationId: getRoute
      summary: Read one routed prefix
      tags: [Routes]
      x-ntip-roles: [viewer, operator, superuser]
      responses:
        '200':
          description: Route details.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
