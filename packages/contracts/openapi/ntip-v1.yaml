      type: object
      additionalProperties: false
      readOnly: true
      required: [node, bootstrap]
      properties:
        node:
          $ref: '#/components/schemas/Node'
        bootstrap:
          $ref: '#/components/schemas/EnrollmentBootstrapDisclosure'
      description: Node state plus a one-time bootstrap invitation disclosure.
