openapi: 3.1.1
info:
  title: NTIP Public Bootstrap API
  version: 1.0.0
  summary: Cookie-independent Node bootstrap contract for NTIP v0.2.
  description: |
    A deliberately small public interface for downloading a pinned installer,
    redeeming a short-lived bootstrap invitation, and fetching immutable
    Node-only release assets. It never accepts management cookies, never
    enables CORS, never redirects, and never returns invitation status details.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: /
    description: Public HTTPS origin configured by the operator
security: []
tags:
  - name: Bootstrap
  - name: Bootstrap assets
paths:
  /enrollment/{bootstrapId}:
    parameters:
      - $ref: '#/components/parameters/BootstrapId'
    get:
      operationId: getBootstrapInstaller
      summary: Generate the locator-specific bootstrap shell program
      tags: [Bootstrap]
      x-ntip-cookie-independent: true
      x-ntip-cors: disabled
      x-ntip-redirects: forbidden
      responses:
        '200':
          description: |
            Complete Bash program whose definitions are followed by one final
            `main` call. It contains the public locator and configured SPKI pin,
            but never contains the secret code or an enrollment credential.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            X-Content-Type-Options:
              $ref: '#/components/headers/NoSniff'
          content:
            text/x-shellscript:
              schema:
                type: string
                minLength: 1
                maxLength: 65536
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '404':
          $ref: '#/components/responses/BootstrapUnavailable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /enrollment/v1/redeem:
    post:
      operationId: redeemBootstrapInvitation
      summary: Redeem a locator and short code for an enrollment bundle
      description: |
        Unknown, incorrect, expired, revoked, consumed, and locked invitations
        all receive the same `bootstrap_unavailable` response. A successful
        response contains secrets and must flow directly into bounded import.
      tags: [Bootstrap]
      x-ntip-cookie-independent: true
      x-ntip-cors: disabled
      x-ntip-redirects: forbidden
      x-ntip-reject-origin: true
      x-ntip-reject-transfer-encoding: true
      x-ntip-max-request-body-bytes: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapRedeemRequest'
      responses:
        '200':
          description: Strict, one-time enrollment import bundle.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestId'
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            X-Content-Type-Options:
              $ref: '#/components/headers/NoSniff'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapRedemptionBundle'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '404':
          $ref: '#/components/responses/BootstrapUnavailable'
        '413':
          $ref: '#/components/responses/InvalidRequest'
        '415':
          $ref: '#/components/responses/InvalidRequest'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /enrollment/assets/{versioned-file}:
    parameters:
      - $ref: '#/components/parameters/VersionedFile'
    get:
      operationId: getBootstrapAsset
      summary: Download an immutable versioned Node-only release asset
      description: This path is served directly by NGINX and never enters an API worker.
      tags: [Bootstrap assets]
      x-ntip-owner: nginx
      x-ntip-cookie-independent: true
      x-ntip-cors: disabled
      x-ntip-redirects: forbidden
      responses:
        '200':
          description: Versioned archive, checksum, manifest, or SBOM bytes.
          headers:
            Cache-Control:
              $ref: '#/components/headers/Immutable'
            X-Content-Type-Options:
              $ref: '#/components/headers/NoSniff'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: The versioned asset does not exist.
          headers:
            Cache-Control:
              $ref: '#/components/headers/NoStore'
            X-Content-Type-Options:
              $ref: '#/components/headers/NoSniff'
components:
  headers:
    XRequestId:
      description: Lowercase request identifier used for operational correlation.
      required: true
      schema:
        $ref: '#/components/schemas/RequestId'
    NoStore:
      description: Bootstrap responses containing generated or mutable data are never cached.
      required: true
      schema:
        type: string
        const: no-store
    Immutable:
      description: Versioned assets are public and immutable for one year.
      required: true
      schema:
        type: string
        const: public, max-age=31536000, immutable
    NoSniff:
      description: Prevent content-type sniffing.
      required: true
      schema:
        type: string
        const: nosniff
    RetryAfter:
      description: Seconds until another attempt may be made.
      required: true
      schema:
        type: integer
        minimum: 1
  parameters:
    BootstrapId:
      name: bootstrapId
      in: path
      required: true
      description: Public bootstrap locator; it is not an authenticator.
      schema:
        $ref: '#/components/schemas/BootstrapId'
    VersionedFile:
      name: versioned-file
      in: path
      required: true
      description: Basename selected from the configured immutable asset manifest.
      schema:
        type: string
        minLength: 1
        maxLength: 160
        pattern: '^[A-Za-z0-9][A-Za-z0-9._+-]*$'
  responses:
    InvalidRequest:
      description: The bounded request framing, media type, or strict JSON body is invalid.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
        X-Content-Type-Options:
          $ref: '#/components/headers/NoSniff'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BootstrapErrorResponse'
    BootstrapUnavailable:
      description: |
        The invitation is unknown, incorrect, expired, revoked, consumed, or
        locked. All cases use the same status, error code, message, and shape.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
        X-Content-Type-Options:
          $ref: '#/components/headers/NoSniff'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BootstrapUnavailableErrorResponse'
    RateLimited:
      description: The public bootstrap admission budget is exhausted.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
        X-Content-Type-Options:
          $ref: '#/components/headers/NoSniff'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BootstrapErrorResponse'
    ServiceUnavailable:
      description: A bounded bootstrap dependency is unavailable.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestId'
        Cache-Control:
          $ref: '#/components/headers/NoStore'
        X-Content-Type-Options:
          $ref: '#/components/headers/NoSniff'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BootstrapErrorResponse'
  schemas:
    RequestId:
      type: string
      pattern: '^[0-9a-f]{32}$'
    BootstrapId:
      type: string
      minLength: 8
      maxLength: 8
      pattern: '^[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{8}$'
      examples: [ABCDEFGH]
    BootstrapSecretCode:
      type: string
      writeOnly: true
      minLength: 11
      maxLength: 11
      pattern: '^[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{3}-[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{3}-[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{3}$'
      examples: [ABC-DEF-GHJ]
    Timestamp:
      type: string
      format: date-time
      minLength: 20
      maxLength: 20
      pattern: '^[0-9]{4}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12][0-9]|3[01])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]Z$'
      description: Whole-second RFC 3339 timestamp in canonical UTC form.
      examples: ['2026-07-22T19:00:00Z']
    NodeName:
      type: string
      minLength: 1
      maxLength: 63
      pattern: '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,62}$'
    MasterEndpoint:
      type: string
      minLength: 3
      maxLength: 272
      pattern: '^(?:\[[0-9A-Fa-f:.]+\]|[A-Za-z0-9.-]+):[1-9][0-9]{0,4}$'
      description: Authoritative configured UDP endpoint; never inferred from HTTP headers.
      examples: ['43.157.23.67:49152']
    InternalEnrollmentCredential:
      type: string
      readOnly: true
      minLength: 122
      maxLength: 122
      pattern: '^ntip-enroll-v1\.[A-Za-z0-9_-]{107}$'
      description: Master-authenticating internal credential. Never persist or log this value.
    BootstrapArchive:
      type: object
      additionalProperties: false
      required: [version, target, path, sha256, sizeBytes]
      properties:
        version:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[0-9A-Za-z][0-9A-Za-z.+-]*$'
        target:
          type: string
          enum: [x86_64-linux-musl, aarch64-linux-musl]
        path:
          type: string
          minLength: 24
          maxLength: 192
          pattern: '^/enrollment/assets/[A-Za-z0-9][A-Za-z0-9._+-]*$'
        sha256:
          type: string
          minLength: 64
          maxLength: 64
          pattern: '^[0-9a-f]{64}$'
        sizeBytes:
          type: integer
          format: int64
          minimum: 1
          maximum: 268435456
    BootstrapRedeemRequest:
      type: object
      additionalProperties: false
      required: [bootstrapId, secretCode]
      properties:
        bootstrapId:
          $ref: '#/components/schemas/BootstrapId'
        secretCode:
          $ref: '#/components/schemas/BootstrapSecretCode'
    BootstrapRedemptionBundle:
      type: object
      additionalProperties: false
      readOnly: true
      required:
        - schemaVersion
        - bootstrapId
        - nodeName
        - masterEndpoint
        - expiresAt
        - enrollmentCredential
        - archives
      properties:
        schemaVersion:
          type: integer
          const: 1
        bootstrapId:
          $ref: '#/components/schemas/BootstrapId'
        nodeName:
          $ref: '#/components/schemas/NodeName'
        masterEndpoint:
          $ref: '#/components/schemas/MasterEndpoint'
        expiresAt:
          $ref: '#/components/schemas/Timestamp'
        enrollmentCredential:
          $ref: '#/components/schemas/InternalEnrollmentCredential'
        archives:
          type: array
          minItems: 2
          maxItems: 2
          description: One immutable archive for each supported Linux architecture.
          items:
            $ref: '#/components/schemas/BootstrapArchive'
    BootstrapErrorCode:
      type: string
      enum: [invalid_request, bootstrap_unavailable, rate_limited, service_unavailable]
    BootstrapError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          $ref: '#/components/schemas/BootstrapErrorCode'
        message:
          type: string
          minLength: 1
          maxLength: 160
    BootstrapErrorResponse:
      type: object
      additionalProperties: false
      required: [error, requestId]
      properties:
        error:
          $ref: '#/components/schemas/BootstrapError'
        requestId:
          $ref: '#/components/schemas/RequestId'
    BootstrapUnavailableError:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          const: bootstrap_unavailable
        message:
          type: string
          const: Bootstrap invitation is unavailable.
    BootstrapUnavailableErrorResponse:
      type: object
      additionalProperties: false
      required: [error, requestId]
      properties:
        error:
          $ref: '#/components/schemas/BootstrapUnavailableError'
        requestId:
          $ref: '#/components/schemas/RequestId'
